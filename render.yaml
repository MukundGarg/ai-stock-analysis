services:
  - type: web
    name: stocksense-ai-backend
    env: python
    region: oregon
    plan: standard
    runtime: python-3.11
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: OPENAI_API_KEY
        scope: build
        sync: false
      - key: ALLOWED_ORIGINS
        value: "*"
        sync: false
