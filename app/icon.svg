<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="faviconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background rounded square -->  
  <rect x="5" y="5" width="90" height="90" rx="18" fill="url(#faviconGradient)"/>
  
  <!-- Brain/AI Network Nodes -->
  <circle cx="50" cy="35" r="6" fill="white"/>
  <circle cx="35" cy="50" r="5" fill="white" opacity="0.9"/>
  <circle cx="65" cy="50" r="5" fill="white" opacity="0.9"/>
  <circle cx="42" cy="68" r="4" fill="white" opacity="0.8"/>
  <circle cx="58" cy="68" r="4" fill="white" opacity="0.8"/>
  
  <!-- Neural connections -->
  <line x1="50" y1="35" x2="35" y2="50" stroke="white" stroke-width="2" opacity="0.6"/>
  <line x1="50" y1="35" x2="65" y2="50" stroke="white" stroke-width="2" opacity="0.6"/>
  <line x1="35" y1="50" x2="42" y2="68" stroke="white" stroke-width="2" opacity="0.5"/>
  <line x1="65" y1="50" x2="58" y2="68" stroke="white" stroke-width="2" opacity="0.5"/>
  <line x1="35" y1="50" x2="65" y2="50" stroke="white" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Stock chart arrow trending up -->
  <path d="M28 72 L38 62 L48 68 L58 52 L72 38" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <polygon points="72,38 68,42 66,36" fill="white"/>
</svg>
